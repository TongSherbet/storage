<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh; overflow: hidden;
      background: #0c0c0c;
      font-family: 'DM Sans', sans-serif;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,255,255,0.022) 0%, transparent 70%);
    }

    .number {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(7rem, 20vw, 13rem);
      font-weight: 400;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.04em;
      opacity: 0;
      animation: up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
    }

    .line {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, #2a2a2a, transparent);
      margin: 22px 0;
      opacity: 0;
      animation: up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }

    .message {
      font-size: 0.75rem;
      font-weight: 300;
      color: #444;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0;
      animation: up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .btn {
      margin-top: 36px;
      background: none;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 11px 26px;
      color: #777;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      opacity: 0;
      animation: up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }
    .btn:hover {
      border-color: #3a3a3a;
      background: #161616;
      color: #ccc;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="number">404</div>
  <div class="line"></div>
  <p class="message">Page not found</p>
  <button class="btn" onclick="goBack()">bring me back</button>

  <script>
    function goBack() {
      if (history.length > 1) {
        history.back();
      } else {
        window.location.href = '/';
      }
    }
  </script>
</body>
</html>
